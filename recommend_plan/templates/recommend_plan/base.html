<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=3">
    <meta charset="UTF-8">
    <title>Concert Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-200 min-h-screen">

    <!-- 🔥 Navbar -->
    <nav class="flex justify-between items-center px-8 py-4 bg-white shadow">
        <a href="{% url 'login' %}" class="text-xl font-bold">
            🎵 Concert Plan Recommender
        </a>

        <div class="space-x-4">
            {% if user.is_authenticated %}
                <span class="text-sm text-gray-600">
                    Hi, {{ user.username }}
                </span>

                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button class="text-sm underline">
                        Log out
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="text-sm underline ">
                    Log in
                </a>
                <a href="{% url 'signup' %}" class="text-sm underline">
                    Sign up
                </a>
            {% endif %}
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="p-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
